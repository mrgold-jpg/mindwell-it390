<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MindWell – Resources</title>
<nav>
    <a href="index.html">Home</a>
    <a href="insights.html">Insights</a>
    <a href="journal.html">Journal</a>
    <a href="resources.html">Resources</a>
</nav>
<style>
nav {
    margin-top: 10px;
}

nav a {
    color: black;
    text-decoration: none;
    margin: 0 15px;
    font-weight: bold;
}

nav a:hover {
    text-decoration: underline;
}
body { font-family: Arial; background:#f2f4f8; margin:0; }
header { background:#2f5d62; color:white; padding:20px; text-align:center; }
main { max-width:800px; margin:30px auto; background:white; padding:20px; border-radius:8px; }
ul { line-height:1.8; }
</style>
</head>
<script>
document.addEventListener("DOMContentLoaded", function () {
    document.body.classList.add("page-loaded");
});

// Intercept all internal navigation links
document.querySelectorAll("nav a").forEach(link => {
    link.addEventListener("click", function (e) {
        e.preventDefault();
        const target = this.href;

        document.body.classList.remove("page-loaded");
        document.body.classList.add("page-exit");

        setTimeout(() => {
            window.location.href = target;
        }, 350);
    });
});
</script>
<body>
<header>
    <h1>MindWell</h1>
    <p>Mental Health – Emotional Check-In Interface</p>
</header>

<main>
    <h2>Mental Health Resources</h2>
    <ul>
        <li>988 Suicide & Crisis Lifeline (US)</li>
        <li>Grounding technique: 5-4-3-2-1 sensory method</li>
        <li>Breathing exercise: 4-7-8 method</li>
        <li>Reach out to trusted friends or professionals</li>
    </ul>
</main>
</body>
</html>
