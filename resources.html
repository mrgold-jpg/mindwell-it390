<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MindWell – Resources</title>
<link rel="stylesheet" href="style.css">
</head>
<script>
document.addEventListener("DOMContentLoaded", function () {
    document.body.classList.add("page-loaded");
});

// Intercept all internal navigation links
document.querySelectorAll("nav a").forEach(link => {
    link.addEventListener("click", function (e) {
        e.preventDefault();
        const target = this.href;

        document.body.classList.remove("page-loaded");
        document.body.classList.add("page-exit");

        setTimeout(() => {
            window.location.href = target;
        }, 350);
    });
});
</script>
<body>
<header>
    <h1>MindWell</h1>
    <p>Mental Health – Emotional Check-In Interface</p>
</header>

<main>
    <h2>Mental Health Resources</h2>
    <ul>
        <li>988 Suicide & Crisis Lifeline (US)</li>
        <li>Grounding technique: 5-4-3-2-1 sensory method</li>
        <li>Breathing exercise: 4-7-8 method</li>
        <li>Reach out to trusted friends or professionals</li>
    </ul>
</main>
</body>
</html>
