body { font-family: Arial; background:#f2f4f8; margin:0; }
header { background:#2f5d62; color:white; padding:20px; text-align:center; }
main { max-width:800px; margin:30px auto; background:white; padding:20px; border-radius:8px; }

<body>
<header>
    <h1>MindWell</h1>
    <p>Mental Health – Emotional Check-In Interface</p>
</header>
   

<main>
    <h2>Journal History</h2>
    <div id="entries"></div>
</main>

<script>
function loadJournal() {
    let entriesDiv = document.getElementById("entries");
    let entries = [];

    for (let i=0; i<localStorage.length; i++) {
        let key = localStorage.key(i);
        if (key.startsWith("mood-")) {
            let date = key.replace("mood-","");
            let entry = JSON.parse(localStorage.getItem(key));
            entries.push({date, ...entry});
        }
    }

    entries.sort((a,b) => new Date(b.date) - new Date(a.date));

    entriesDiv.innerHTML = entries.map(e => `
        <div class="entry">
            <strong>${e.date}</strong><br>
            Mood: ${e.mood}<br>
            Reflection: ${e.reflection}
        </div>
    `).join("");
}

loadJournal();
</script>
</body>
