<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MindWell – Journal</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
    <h1>MindWell</h1>
    <p>Mental Health – Emotional Check-In Interface</p>
    <nav>
        <a href="index.html">Home</a>
        <a href="insights.html">Insights</a>
        <a href="journal.html">Journal</a>
        <a href="resources.html">Resources</a>
    </nav>
</header>
<main>
    <h2>Journal History</h2>
    <div id="entries"></div>
</main>

<script>
function loadJournal() {
    let entriesDiv = document.getElementById("entries");
    let entries = [];

    for (let i=0; i<localStorage.length; i++) {
        let key = localStorage.key(i);
        if (key.startsWith("mood-")) {
            let date = key.replace("mood-","");
            let entry = JSON.parse(localStorage.getItem(key));
            entries.push({date, ...entry});
        }
    }

    entries.sort((a,b) => new Date(b.date) - new Date(a.date));

    entriesDiv.innerHTML = entries.map(e => `
        <div class="entry">
            <strong>${e.date}</strong><br>
            Mood: ${e.mood}<br>
            Reflection: ${e.reflection}
        </div>
    `).join("");
}

loadJournal();
</script>
</body>

</html>
